services:
  db:
    image: postgres:latest
    container_name: hevy-db
    environment:
      POSTGRES_DB: hevy
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d banco_MUSA"]